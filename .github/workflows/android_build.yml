name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. سحب كود المشروع
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. إعداد بيئة جافا (JDK 17)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. تثبيت أداة Gradle محلياً على السيرفر لتوليد الملف المفقود
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # 4. توليد ملف gradlew المفقود في مشروعك تلقائياً
    - name: Generate Gradle Wrapper
      run: gradle wrapper

    # 5. إعطاء صلاحية التنفيذ للملف الذي تم توليده
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 6. بناء التطبيق واستخراج الـ APK
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 7. رفع ملف الـ APK الناتج للتحميل
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
